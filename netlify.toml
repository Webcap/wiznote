[build]
  command = "npx expo export --platform web"
  functions = "netlify/functions"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy
    Content-Security-Policy = """
      default-src 'self'; 
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://maps.googleapis.com https://generativelanguage.googleapis.com; 
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
      font-src 'self' https://fonts.gstatic.com data:; 
      img-src 'self' data: blob: https: *.supabase.co; 
      connect-src 'self' https://*.supabase.co https://generativelanguage.googleapis.com https://api.stripe.com https://api.webcap.media wss://*.supabase.co; 
      frame-src 'self' https://js.stripe.com; 
      object-src 'none'; 
      base-uri 'self'; 
      form-action 'self'; 
      frame-ancestors 'none';
    """
    
    # Strict Transport Security - Force HTTPS
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # XSS Protection (legacy browsers)
    X-XSS-Protection = "1; mode=block"
    
    # Referrer Policy - Control information sent in Referer header
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Permissions Policy - Control browser features
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(), interest-cohort=()"
    
    # Prevent DNS prefetching
    X-DNS-Prefetch-Control = "off"
    
    # Cross-Origin policies
    Cross-Origin-Embedder-Policy = "credentialless"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
